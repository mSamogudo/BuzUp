name: pos_app
description: "BuzUp POS - app para agentes em SUNMI/Urovo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP + serialization
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Device / location
  device_info_plus: ^11.2.1
  connectivity_plus: ^6.1.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # QR scanner
  mobile_scanner: ^5.2.3

  # Audio (loud success/error beeps on validations)
  audioplayers: ^6.1.0

  # NFC reader is implemented natively (Kotlin) inside MainActivity. No
  # extra package needed.

  # Navigation
  go_router: ^14.7.2

  # Utils
  intl: ^0.19.0
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
