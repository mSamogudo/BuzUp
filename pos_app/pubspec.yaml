name: pos_app
description: "BuzUp POS - app para agentes em SUNMI/Urovo"
publish_to: 'none'
version: 1.3.3+7

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP + serialization
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Device / location
  device_info_plus: ^11.2.1
  connectivity_plus: ^6.1.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # QR scanner
  mobile_scanner: ^5.2.3

  # Audio (loud success/error beeps on validations)
  audioplayers: ^6.1.0

  # NFC reader is implemented natively (Kotlin) inside MainActivity. No
  # extra package needed.

  # Navigation
  go_router: ^14.7.2

  # Utils
  intl: ^0.19.0
  jwt_decoder: ^2.0.1

  # OTA app-update check (current version) + open download link
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.1
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/

# Icone de lancamento da app POS (gerar com: dart run flutter_launcher_icons).
# Fundo azul alinhado ao portal; mark da marca como foreground adaptativo.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/ic_launcher.png"
  adaptive_icon_background: "#0D3B66"
  adaptive_icon_foreground: "assets/icon/ic_launcher_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
