events {}

http {
  include /etc/nginx/mime.types;
  sendfile on;

  # APK release uploads via the portal go through /api/ — the default 1m body
  # limit would 413 them. Allow up to 60M.
  client_max_body_size 60M;

  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  upstream backend_upstream {
    server buzup_backend:8000;
  }

  upstream frontend_upstream {
    server buzup_frontend:80;
  }

  server {
    listen 80;
    server_name _;

    # TLS termina no edge partilhado; manter Location relativo para nao
    # redirecionar para http:// nos links curtos (/baixar, /pos, ...).
    absolute_redirect off;

    location = /healthz {
      return 200 "ok";
      add_header Content-Type text/plain;
    }

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /admin/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /static/ {
      alias /var/www/backend-static/;
    }

    location /media/ {
      alias /var/www/backend-media/;
    }

    # Links de download amigaveis (partilhaveis): /pos e /passageiro descarregam
    # sempre a ultima versao publicada. A pagina /baixar e servida pela SPA
    # (React DownloadPage) via location / abaixo; /api/baixar/ mantem-se como
    # fallback HTML sem JavaScript.
    location = /pos { return 302 /api/apps/pos/download/; }
    location = /passageiro { return 302 /api/apps/passageiro/download/; }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
  }
}
