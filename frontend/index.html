<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D3B66" />
    <meta name="application-name" content="BusUp" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BusUp" />
    <!--
      Per-page SEO (title, description, canonical, hreflang, Open Graph, Twitter,
      JSON-LD) is injected per route by react-helmet-async via src/ui/Seo.tsx.
      Keep those tags OUT of this shell so pre-rendered pages don't get duplicate
      / conflicting canonical and og:url tags. Only universal fallbacks live here.
    -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>BusUp — Pague a sua viagem com um toque</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
